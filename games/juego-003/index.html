<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Neon Surfer</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#04060a;color:#fff;font-family:system-ui}
    #hud{position:fixed;top:10px;left:10px;z-index:2;font-weight:700;text-shadow:1px 1px #000}
    #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:10;text-align:center}
    .btn{background:#1f5;color:#000;padding:12px 24px;border-radius:12px;font-weight:900;cursor:pointer;user-select:none;display:inline-block;margin-top:10px}
    canvas{display:block;width:100%;height:100%}
  </style>
</head>
<body>
  <a href="../../index.html" style="position:fixed;top:10px;right:10px;z-index:20;background:#1f5;color:#000;padding:8px 12px;border-radius:10px;font-weight:900;text-decoration:none">Lista de juegos</a>
  <div id="hud">Distancia: <b id="dist">0</b> | Record: <b id="best">0</b></div>
  <div id="overlay">
    <div>
      <div style="font-size:26px;margin-bottom:10px"><b>Neon Surfer</b></div>
      <div style="opacity:.8">Click/Tap para cambiar de carril</div>
      <div class="btn" id="startBtn">COMENZAR</div>
    </div>
  </div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const distEl = document.getElementById('dist');
    const bestEl = document.getElementById('best');

    let W,H; function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight} resize(); addEventListener('resize',resize);

    let running=false; let dist=0; let best=+localStorage.getItem('ns_best')||0;
    let lane=0; // -1 left, 0 center, 1 right
    let speed=6;
    let obstacles=[]; let lastSpawn=0;

    function reset(){dist=0; speed=6; lane=0; obstacles=[];}

    function spawn(){
      const l = [-1,0,1][Math.floor(Math.random()*3)];
      obstacles.push({x:W+40, lane:l});
    }

    function update(dt){
      dist += speed*dt*10; speed += dt*0.2;
      lastSpawn += dt; if(lastSpawn>0.7){spawn(); lastSpawn=0;}
      obstacles.forEach(o=>o.x -= speed*dt*70);
      obstacles = obstacles.filter(o=>o.x>-60);

      // collision
      const px = W/2 + lane*120;
      for(const o of obstacles){
        const ox = o.x; const oy = H-140; 
        if(px-15 < ox+30 && px+15 > ox && oy-20 < H-140+30 && oy+20 > H-140){
          end(); break;
        }
      }
    }

    function draw(){
      ctx.fillStyle='#04060a'; ctx.fillRect(0,0,W,H);
      // road lines
      ctx.strokeStyle='rgba(255,255,255,0.15)';
      for(let i=0;i<12;i++){
        let y = (i*60 + (Date.now()*0.2)) % (H+120) - 120;
        ctx.beginPath(); ctx.moveTo(W/2-120, y); ctx.lineTo(W/2-120, y+30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(W/2, y); ctx.lineTo(W/2, y+30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(W/2+120, y); ctx.lineTo(W/2+120, y+30); ctx.stroke();
      }
      // player
      const px = W/2 + lane*120; const py = H-140;
      ctx.fillStyle='#1f5'; ctx.fillRect(px-18, py-18, 36, 36);
      // obstacles
      ctx.fillStyle='#f55';
      obstacles.forEach(o=>{ ctx.fillRect(o.x, H-160, 30, 30); });

      distEl.textContent = Math.floor(dist);
      bestEl.textContent = best;
    }

    function end(){
      running=false; if(dist>best){best=Math.floor(dist); localStorage.setItem('ns_best',best)}
      overlay.style.display='flex';
    }

    let last=performance.now();
    function loop(t){
      const dt=(t-last)/1000; last=t;
      if(running) update(dt);
      draw(); requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    function changeLane(){ lane = (lane+1)%3 -1; }
    canvas.addEventListener('click', ()=>{ if(!running){overlay.style.display='none'; reset(); running=true;} else {changeLane();} });
    canvas.addEventListener('touchstart', e=>{ if(!running){overlay.style.display='none'; reset(); running=true;} else {changeLane();} }, {passive:true});
    startBtn.onclick=()=>{overlay.style.display='none'; reset(); running=true;};
  </script>
</body>
</html>
