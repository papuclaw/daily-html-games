<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Idle Reactor</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#0b0b12;color:#fff;font-family:system-ui}
    .wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:14px;padding:18px;text-align:center}
    .card{background:#151524;border:1px solid #2a2a42;border-radius:14px;padding:16px;width:min(420px,92vw)}
    .big{font-size:36px;font-weight:900}
    .btn{background:#1f5;color:#000;padding:12px 18px;border-radius:12px;font-weight:900;cursor:pointer;user-select:none;display:inline-block}
    .btn:active{transform:scale(.98)}
    .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .muted{opacity:.75}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="big">⚡ Idle Reactor</div>
      <div class="muted">Tendencia: juegos idle / incremental</div>
    </div>

    <div class="card">
      <div>ENERGÍA</div>
      <div class="big" id="energy">0</div>
      <div class="muted">Por segundo: <span id="eps">0</span></div>
      <div class="row" style="margin-top:12px">
        <div class="btn" id="tapBtn">GENERAR +1</div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div class="btn" id="buyGen">Comprar Generador (+1/s)</div>
        <div class="btn" id="buyCore">Mejorar Núcleo (x2 tap)</div>
      </div>
      <div class="muted" style="margin-top:10px">
        Gen: <span id="genCount">0</span> (costo <span id="genCost">10</span>) • Núcleo: <span id="coreLvl">0</span> (costo <span id="coreCost">25</span>)
      </div>
    </div>
  </div>

  <script>
    const $ = (id)=>document.getElementById(id);
    let energy = +localStorage.getItem('idle_energy')||0;
    let gens = +localStorage.getItem('idle_gens')||0;
    let core = +localStorage.getItem('idle_core')||0;

    const genBase=10, coreBase=25;
    const genCost = ()=> Math.floor(genBase * Math.pow(1.25, gens));
    const coreCost = ()=> Math.floor(coreBase * Math.pow(1.5, core));
    const tapPower = ()=> 1 * Math.pow(2, core);
    const eps = ()=> gens;

    function save(){
      localStorage.setItem('idle_energy', energy);
      localStorage.setItem('idle_gens', gens);
      localStorage.setItem('idle_core', core);
    }

    function render(){
      $('energy').textContent = Math.floor(energy);
      $('eps').textContent = eps();
      $('genCount').textContent = gens;
      $('coreLvl').textContent = core;
      $('genCost').textContent = genCost();
      $('coreCost').textContent = coreCost();
    }

    $('tapBtn').onclick = ()=>{ energy += tapPower(); render(); save(); };

    $('buyGen').onclick = ()=>{
      const cost = genCost();
      if(energy>=cost){ energy-=cost; gens++; render(); save(); }
    };

    $('buyCore').onclick = ()=>{
      const cost = coreCost();
      if(energy>=cost){ energy-=cost; core++; render(); save(); }
    };

    let last=performance.now();
    function loop(t){
      const dt=(t-last)/1000; last=t;
      energy += eps()*dt;
      render();
      requestAnimationFrame(loop);
    }
    render(); requestAnimationFrame(loop);
  </script>
</body>
</html>
